<html lang="en" manifest="cache.appcache">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7277543096175575" crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-7277543096175575">
  <meta charset="UTF-8">
  <title>🟡   🇸‌🇭‌🇴‌🇵‌ 🇦‌🇵‌🇵‌🇰‌🇬‌ 📦 🟡 🇼‌-🇧‌🇪‌🇹‌🇦‌ 🔹🇭‌🇴‌🇲‌🇪‌🇧‌🇷‌🇪‌🇼</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

 
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .logo {
      width: 90%;
      max-width: 280px;
      height: auto;
      margin-bottom: 25px;
      display: block;
    }


    .button {
      background-color: #FFD700;
      color: #000;
      padding: 14px 28px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      box-shadow: 0 0 15px #FFD700;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      display: inline-block;
      text-align: center;
      margin-top: 10px;
    }

    .button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #FFD700;
    }

    .astro-bottom {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 100px;
      height: auto;
      overflow: visible;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transform: translateY(20px);
      animation: astroIn 0.8s ease-out 0.2s forwards;
    }

    .astro-bottom img {
      width: 100%;
      height: auto;
      display: block;
    }

    @keyframes astroIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  
    .astro-bubble {
      position: fixed;
      bottom: 95px;
      right: 20px;
      max-width: 200px;
      background: #fff;
      color: #000;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 12px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      animation: bubbleIn 0.6s ease-out forwards;
      z-index: 10000;
      line-height: 1.35;
      cursor: pointer;
    }

    .astro-bubble::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -6px;
      transform: translateY(-50%);
      border-width: 6px 0 6px 6px;
      border-style: solid;
      border-color: transparent transparent transparent #fff;
    }

    .astro-bubble a {
      color: #0070ba;
      text-decoration: none;
      font-weight: bold;
      font-size: 11px;
      display: inline-block;
      word-break: break-all;
    }

    .astro-bubble a:hover {
      text-decoration: underline;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

  
    .website-by {
      position: fixed;
      bottom: 12px;
      left: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      color: #fff;
      opacity: 0.6;
      text-decoration: none;
      transition: opacity 0.3s ease;
      z-index: 10000;
      background: rgba(0,0,0,0.5);
      padding: 4px 8px;
      border-radius: 20px;
    }

    .website-by:hover {
      opacity: 1;
    }

    /* ========== ESTILOS PARA PS5 (175% ZOOM) ========== */
    @media (min-width: 800px) {
      body.ps5-zoom {
        padding: 0;
        overflow: hidden;
      }
      
      .ps5-zoom .main-content {
        max-width: none;
        margin-top: -60px;
      }
      
      .ps5-zoom .logo {
        width: auto;
        max-width: none;
        height: 525px;
        margin-bottom: 30px;
      }
      
      .ps5-zoom .button {
        padding: 26px 52px;
        font-size: 32px;
        border-radius: 18px;
        box-shadow: 0 0 26px #FFD700;
      }
      
      .ps5-zoom .button:hover {
        box-shadow: 0 0 44px #FFD700;
      }
      
      .ps5-zoom .astro-bottom {
        width: 315px;
        bottom: 5px;
        right: 20px;
      }
      
      .ps5-zoom .astro-bubble {
        bottom: 280px;
        right: 385px;
        max-width: 385px;
        font-size: 21px;
        padding: 10px 18px;
        border-radius: 18px;
      }
      
      .ps5-zoom .astro-bubble::after {
        right: -14px;
        border-width: 14px 0 14px 14px;
      }
      
      .ps5-zoom .astro-bubble a {
        font-size: 21px;
      }
      
      .ps5-zoom .website-by {
        bottom: 14px;
        left: 21px;
        font-size: 21px;
        background: none;
        padding: 0;
      }
    }

    /* Ajuste para pantallas de PS5 en 720p */
    @media (max-height: 700px) and (min-width: 800px) {
      .ps5-zoom .logo { height: 420px; }
      .ps5-zoom .button { padding: 20px 40px; font-size: 26px; }
      .ps5-zoom .astro-bottom { width: 250px; bottom: 0; right: 10px; }
      .ps5-zoom .astro-bubble { bottom: 220px; right: 290px; font-size: 16px; max-width: 300px; }
      .ps5-zoom .astro-bubble a { font-size: 16px; }
      .ps5-zoom .website-by { font-size: 16px; }
      .ps5-zoom .main-content { margin-top: -40px; }
    }

    /* Ajustes para móviles muy pequeños */
    @media (max-width: 480px) {
      .astro-bubble {
        max-width: 170px;
        font-size: 9px;
        bottom: 85px;
        right: 15px;
        padding: 6px 10px;
      }
      .astro-bubble a {
        font-size: 9px;
      }
      .astro-bottom {
        width: 80px;
        bottom: 8px;
        right: 8px;
      }
      .website-by {
        font-size: 9px;
        bottom: 8px;
        left: 8px;
      }
      .button {
        padding: 12px 24px;
        font-size: 16px;
      }
      .logo {
        max-width: 220px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="main-content">
    <img class="logo" src="logo-themesps4.png" alt="PS5 SHOP APPKG Logo">
    <a class="button" id="enterBtn" href="https://ps5shopappkg.infy.uk/">ENTER NOW</a>
  </div>

  <div class="astro-bottom">
    <img src="astros-playroom.gif" alt="Astro saludando">
  </div>

  <div class="astro-bubble" onclick="window.open('https://ko-fi.com/mouuu', '_blank')">
    <span id="astro-msg"></span><br>
    <a href="https://ko-fi.com/mouuu" target="_blank" onclick="event.stopPropagation();">https://ko-fi.com/mouuu</a>
  </div>

  <a class="website-by" href="https://x.com/m0ur0ne" target="_blank">Website by mour0ne</a>

  <script>
    // Detectar si es PS5 y aplicar la clase .ps5-zoom
    (function() {
      const isPS5 = navigator.userAgent.includes("PlayStation 5");
      if (isPS5) {
        document.body.classList.add('ps5-zoom');
      }
    })();

    // Mensajes multilenguaje
    (function () {
      const msgs = {
        es: "★ Apoya el proyecto para seguir mejorando. ¡Cada pequeña ayuda cuenta! ¡Gracias!",
        en: "★ Support the project so we can keep improving. Every little bit helps! Thank you!",
        fr: "★ Soutiens le projet pour que nous puissions continuer à l'améliorer. Chaque aide compte ! Merci !",
        de: "★ Unterstütze das Projekt, damit wir es weiter verbessern können. Jeder Beitrag hilft! Danke!",
        it: "★ Sostieni il progetto per continuare a migliorarlo. Ogni aiuto conta! Grazie!",
        pt: "★ Apoie o projeto para continuarmos melhorando. Toda ajuda conta! Obrigado!",
        "pt-br": "★ Apoie o projeto para continuarmos melhorando. Toda ajuda conta! Obrigado!",
        ru: "★ Поддержите проект, чтобы мы продолжали развиваться. Любая помощь важна! Спасибо!",
        ar: "★ ادعم المشروع كي نستمر في التحسين. كل مساعدة تهم! شكرًا لك!",
        ja: "★ プロジェクトの改善を続けるためにご支援ください。小さな支援でも大きな力になります！ありがとうございます！",
        ko: "★ 프로젝트가 계속 발전할 수 있도록 지원해주세요. 작은 도움도 큰 힘이 됩니다! 감사합니다!",
        "zh-cn": "★ 请支持本项目以便我们持续改进。每一点帮助都很重要！谢谢！",
        "zh-tw": "★ 請支持本專案以便我們持續改進。每一點幫助都很重要！謝謝！",
        hi: "★ परियोजना को बेहतर बनाने में मदद करें। आपका हर छोटा योगदान मायने रखता है! धन्यवाद!"
      };
      const langRaw = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      const base = langRaw.split('-')[0];
      const key = msgs[langRaw] ? langRaw : (msgs[base] ? base : "en");
      const el = document.getElementById("astro-msg");
      if (el) el.textContent = msgs[key];
      if (key === "ar") {
        const bubble = document.querySelector(".astro-bubble");
        if (bubble) {
          bubble.setAttribute("dir", "rtl");
          bubble.style.textAlign = "right";
        }
      }
    })();
  </script>
</body>
</html>
