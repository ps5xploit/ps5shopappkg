<html lang="en" manifest="cache.appcache">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7277543096175575" crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-7277543096175575">
  <meta charset="UTF-8">
  <title>🟡   🇸‌🇭‌🇴‌🇵‌ 🇦‌🇵‌🇵‌🇰‌🇬‌ 📦 🟡 🇼‌-🇧‌🇪‌🇹‌🇦‌ 🔹🇭‌🇴‌🇲‌🇪‌🇧‌🇷‌🇪‌🇼</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    /* Contenedor principal */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: -60px; /* Ajustado para 175% */
    }

    /* Logo más grande: 300px * 1.75 = 525px */
    img {
      height: 525px;
      margin-bottom: 30px;
      display: block;
    }

    /* Botón más grande */
    .button {
      background-color: #FFD700;
      color: #000;
      padding: 26px 52px;  /* 15*1.75 ≈ 26, 30*1.75 ≈ 52 */
      text-decoration: none;
      font-weight: bold;
      font-size: 32px;     /* 18*1.75 ≈ 32 */
      border: none;
      border-radius: 18px;  /* 10*1.75 ≈ 18 */
      box-shadow: 0 0 26px #FFD700; /* 15*1.75 ≈ 26 */
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      display: inline-block;
    }

    .button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 44px #FFD700; /* 25*1.75 ≈ 44 */
    }

    /* Astro - más grande y reposicionado */
    .astro-bottom {
      position: fixed;
      bottom: 5px;
      right: 20px;
      width: 315px;  /* 180px * 1.75 = 315px */
      height: auto;
      overflow: visible;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transform: translateY(20px);
      animation: astroIn 0.8s ease-out 0.2s forwards;
    }

    .astro-bottom img {
      width: 100%;
      height: auto;
      bottom: 0;
      position: relative;
    }

    @keyframes astroIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Bocadillo más grande - encima de Astro */
    .astro-bubble {
      position: fixed;
      bottom: 280px;   /* 160px * 1.75 = 280px */
      right: 385px;    /* 220px * 1.75 = 385px */
      max-width: 385px; /* 220px * 1.75 = 385px */
      background: #fff;
      color: #000;
      font-family: 'Rajdhani', sans-serif;
      font-size: 21px;   /* 12px * 1.75 = 21px */
      padding: 10px 18px; /* 6*1.75≈10, 10*1.75≈18 */
      border-radius: 18px;
      box-shadow: 0 0 14px rgba(0,0,0,0.3);
      animation: bubbleIn 0.6s ease-out forwards;
      z-index: 10000;
      line-height: 1.25;
      cursor: pointer;
    }

    .astro-bubble::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -14px; /* 8*1.75=14 */
      transform: translateY(-50%);
      border-width: 14px 0 14px 14px; /* 8*1.75=14 */
      border-style: solid;
      border-color: transparent transparent transparent #fff;
    }

    .astro-bubble a {
      color: #0070ba;
      text-decoration: none;
      font-weight: bold;
      font-size: 21px; /* 12*1.75=21 */
    }

    .astro-bubble a:hover {
      text-decoration: underline;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Website by - más grande */
    .website-by {
      position: fixed;
      bottom: 14px;    /* 8px * 1.75 = 14px */
      left: 21px;      /* 12px * 1.75 = 21px */
      font-family: 'Rajdhani', sans-serif;
      font-size: 21px; /* 12px * 1.75 = 21px */
      color: #fff;
      opacity: 0.7;
      text-decoration: none;
      transition: opacity 0.3s ease;
      z-index: 10000;
    }

    .website-by:hover {
      opacity: 1;
    }

    /* Ajuste para pantallas muy pequeñas (ej. PS5 en 720p) - adaptado al 175% */
    @media (max-height: 700px) {
      img { height: 420px; }
      .button { padding: 20px 40px; font-size: 26px; }
      .astro-bottom { width: 250px; bottom: 0; right: 10px; }
      .astro-bubble { bottom: 220px; right: 290px; font-size: 16px; max-width: 300px; }
      .astro-bubble a { font-size: 16px; }
      .website-by { font-size: 16px; }
      .main-content { margin-top: -40px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="main-content">
    <img src="logo-themesps4.png" alt="PS5 SHOP APPKG Logo">
    <a class="button" id="enterBtn" href="https://ps5shopappkg.infy.uk/">ENTER NOW</a>
  </div>

  <div class="astro-bottom">
    <img src="astros-playroom.gif" alt="Astro saludando">
  </div>

  <div class="astro-bubble" onclick="window.open('https://ko-fi.com/mouuu', '_blank')">
    <span id="astro-msg"></span><br>
    <a href="https://ko-fi.com/mouuu" target="_blank" onclick="event.stopPropagation();">https://ko-fi.com/mouuu</a>
  </div>

  <a class="website-by" href="https://x.com/m0ur0ne" target="_blank">Website by mour0ne</a>

  <script>
    (function () {
      const msgs = {
        es: "★ Apoya el proyecto para seguir mejorando. ¡Cada pequeña ayuda cuenta! ¡Gracias!",
        en: "★ Support the project so we can keep improving. Every little bit helps! Thank you!",
        fr: "★ Soutiens le projet pour que nous puissions continuer à l'améliorer. Chaque aide compte ! Merci !",
        de: "★ Unterstütze das Projekt, damit wir es weiter verbessern können. Jeder Beitrag hilft! Danke!",
        it: "★ Sostieni il progetto per continuare a migliorarlo. Ogni aiuto conta! Grazie!",
        pt: "★ Apoie o projeto para continuarmos melhorando. Toda ajuda conta! Obrigado!",
        "pt-br": "★ Apoie o projeto para continuarmos melhorando. Toda ajuda conta! Obrigado!",
        ru: "★ Поддержите проект, чтобы мы продолжали развиваться. Любая помощь важна! Спасибо!",
        ar: "★ ادعم المشروع كي نستمر في التحسين. كل مساعدة تهم! شكرًا لك!",
        ja: "★ プロジェクトの改善を続けるためにご支援ください。小さな支援でも大きな力になります！ありがとうございます！",
        ko: "★ 프로젝트가 계속 발전할 수 있도록 지원해주세요. 작은 도움도 큰 힘이 됩니다! 감사합니다!",
        "zh-cn": "★ 请支持本项目以便我们持续改进。每一点帮助都很重要！谢谢！",
        "zh-tw": "★ 請支持本專案以便我們持續改進。每一點幫助都很重要！謝謝！",
        hi: "★ परियोजना को बेहतर बनाने में मदद करें। आपका हर छोटा योगदान मायने रखता है! धन्यवाद!"
      };
      const langRaw = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      const base = langRaw.split('-')[0];
      const key = msgs[langRaw] ? langRaw : (msgs[base] ? base : "en");
      const el = document.getElementById("astro-msg");
      if (el) el.textContent = msgs[key];
      if (key === "ar") {
        const bubble = document.querySelector(".astro-bubble");
        if (bubble) {
          bubble.setAttribute("dir", "rtl");
          bubble.style.textAlign = "right";
        }
      }
    })();
  </script>
</body>
</html>
