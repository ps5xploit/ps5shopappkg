name: Download Specific Games (Full Parts)

on:
  workflow_dispatch:

jobs:
  copy-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install GitHub CLI
        run: |
          echo "📦 Instalando GitHub CLI..."
          curl -L -o gh.tar.gz https://github.com/cli/cli/releases/latest/download/gh_2.95.0_linux_amd64.tar.gz
          tar -xzf gh.tar.gz
          sudo mv gh_*_linux_amd64/bin/gh /usr/local/bin/
          sudo chmod +x /usr/local/bin/gh
          gh --version

      - name: Download games
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_REPO: "eternumplay/pkstg"
          DEST_REPO: "ps5xploit/ps5shopappkg"
        run: |
          export GH_TOKEN="$GH_TOKEN"
          gh auth status
          
          # Lista de juegos a descargar (nombres exactos de los tags)
          GAMES="Crimson AstroBot Asterix_&_Obelix_Heroes Aeterna_Noctis"
          
          for GAME in $GAMES; do
            echo "📦 Procesando: $GAME"
            
            # Obtener la lista de assets del juego usando la API
            ASSETS_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$SOURCE_REPO/releases/tags/$GAME" | jq '.assets')
            
            # Verificar si se encontraron assets
            if [ "$ASSETS_JSON" = "null" ] || [ -z "$ASSETS_JSON" ]; then
              echo "  ❌ No se encontraron assets para: $GAME"
              continue
            fi
            
            # Contar cuántos assets tiene
            ASSET_COUNT=$(echo "$ASSETS_JSON" | jq 'length')
            echo "  📋 $ASSET_COUNT archivos encontrados"
            
            # Verificar si el release ya existe en destino
            if gh release view "$GAME" --repo "$DEST_REPO" &>/dev/null; then
              echo "  ⏭️  Release $GAME ya existe. Saltando."
              continue
            fi
            
            # Crear el release en destino
            echo "  📝 Creando release $GAME..."
            gh release create "$GAME" --title "$GAME" --repo "$DEST_REPO" --notes "Copiado desde ps5shopappkg" || true
            
            # Descargar y subir cada asset
            echo "$ASSETS_JSON" | jq -r '.[].browser_download_url' | while read -r ASSET_URL; do
              FILENAME=$(basename "$ASSET_URL")
              echo "    📥 Descargando: $FILENAME"
              curl -L -o "$FILENAME" "$ASSET_URL"
              echo "    📤 Subiendo: $FILENAME"
              gh release upload "$GAME" "$FILENAME" --repo "$DEST_REPO" --clobber
              rm "$FILENAME"
              echo "    ✅ $FILENAME copiado."
            done
            
            echo "  ✅ $GAME copiado correctamente."
          done
          
          echo "🎉 ¡Proceso completado!"
