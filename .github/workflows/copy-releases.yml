name: Copy Releases from Source Repo

on:
  workflow_dispatch:

jobs:
  copy-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Copy releases from source repo
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REPO: "eternumplay/pkstg"
        run: |
          echo "🔐 Autenticando con GitHub CLI..."
          echo "$GH_TOKEN" | gh auth login --with-token
          
          echo "📦 Obteniendo releases de $SOURCE_REPO..."
          RELEASES=$(gh release list --repo "$SOURCE_REPO" --limit 100 --json name,id,tagName,isPrerelease,assets)
          
          echo "📋 Total releases: $(echo "$RELEASES" | jq -r '.[] | .tagName' | wc -l)"
          
          echo "$RELEASES" | jq -c '.[]' | while read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tagName')
            RELEASE_NAME=$(echo "$release" | jq -r '.name')
            IS_PRERELEASE=$(echo "$release" | jq -r '.isPrerelease')
            
            echo "📦 Procesando release: $RELEASE_NAME ($TAG_NAME)"
            
            if gh release view "$TAG_NAME" --repo "${{ github.repository }}" &>/dev/null; then
              echo "  ⏭️  Release $TAG_NAME ya existe. Saltando."
              continue
            fi
            
            echo "  📝 Creando release $TAG_NAME..."
            if [ "$IS_PRERELEASE" = "true" ]; then
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" --prerelease --repo "${{ github.repository }}" --notes "Copiado desde $SOURCE_REPO"
            else
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" --repo "${{ github.repository }}" --notes "Copiado desde $SOURCE_REPO"
            fi
            
            ASSETS=$(echo "$release" | jq -r '.assets[].url')
            for asset_url in $ASSETS; do
              if [ -n "$asset_url" ]; then
                echo "    📥 Copiando asset: $(basename "$asset_url")"
                curl -L -H "Authorization: token $GH_TOKEN" -o "$(basename "$asset_url")" "$asset_url"
                gh release upload "$TAG_NAME" "$(basename "$asset_url")" --repo "${{ github.repository }}" --clobber
                rm "$(basename "$asset_url")"
              fi
            done
            echo "  ✅ Release $TAG_NAME copiado correctamente."
          done
          echo "🎉 ¡Proceso completado!"
