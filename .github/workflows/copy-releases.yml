name: Copy Releases from Source Repo

on:
  workflow_dispatch:

jobs:
  copy-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4

      - name: Copy releases using GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_REPO: "eternumplay/pkstg"
          DEST_REPO: "ps5xploit/ps5shopappkg"
        run: |
          echo "📦 Obteniendo releases de $SOURCE_REPO..."
          
          # Obtener la lista de releases
          RELEASES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$SOURCE_REPO/releases?per_page=100")
          
          # Extraer los tags
          TAGS=$(echo "$RELEASES" | jq -r '.[].tag_name')
          
          echo "📋 Releases encontrados: $(echo "$TAGS" | wc -l)"
          
          for TAG in $TAGS; do
            echo "📦 Procesando: $TAG"
            
            # Verificar si el release ya existe en el destino
            EXISTE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$DEST_REPO/releases/tags/$TAG")
            
            if [ "$EXISTE" = "200" ]; then
              echo "  ⏭️  Release $TAG ya existe. Saltando."
              continue
            fi
            
            # Obtener detalles del release
            RELEASE_DATA=$(echo "$RELEASES" | jq -r ".[] | select(.tag_name == \"$TAG\")")
            RELEASE_NAME=$(echo "$RELEASE_DATA" | jq -r '.name')
            IS_PRERELEASE=$(echo "$RELEASE_DATA" | jq -r '.prerelease')
            BODY=$(echo "$RELEASE_DATA" | jq -r '.body')
            
            # Crear el nuevo release
            echo "  📝 Creando release $TAG..."
            CREATE_PAYLOAD=$(jq -n \
              --arg tag "$TAG" \
              --arg name "$RELEASE_NAME" \
              --arg body "Copiado desde $SOURCE_REPO" \
              '{tag_name: $tag, name: $name, body: $body, prerelease: false}')
            
            if [ "$IS_PRERELEASE" = "true" ]; then
              CREATE_PAYLOAD=$(echo "$CREATE_PAYLOAD" | jq '.prerelease = true')
            fi
            
            CREATE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$CREATE_PAYLOAD" \
              "https://api.github.com/repos/$DEST_REPO/releases")
            
            RELEASE_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id')
            
            if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
              echo "  ❌ Error al crear el release: $CREATE_RESPONSE"
              continue
            fi
            
            # Obtener los assets del release origen
            ASSETS=$(echo "$RELEASE_DATA" | jq -r '.assets[].browser_download_url')
            
            for ASSET_URL in $ASSETS; do
              FILENAME=$(basename "$ASSET_URL")
              echo "    📥 Descargando: $FILENAME"
              
              # Descargar el asset
              curl -L -o "$FILENAME" \
                -H "Authorization: token $GITHUB_TOKEN" \
                "$ASSET_URL"
              
              echo "    📤 Subiendo: $FILENAME"
              
              # Subir el asset al release destino
              curl -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: $(file -b --mime-type "$FILENAME")" \
                --data-binary @"$FILENAME" \
                "https://uploads.github.com/repos/$DEST_REPO/releases/$RELEASE_ID/assets?name=$FILENAME"
              
              rm "$FILENAME"
            done
            
            echo "  ✅ $TAG copiado correctamente."
          done
          
          echo "🎉 ¡Proceso completado!"
