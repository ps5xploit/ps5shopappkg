name: Copy Missing Releases

on:
  workflow_dispatch:

jobs:
  copy-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          echo "📦 Instalando GitHub CLI..."
          curl -L -o gh.tar.gz https://github.com/cli/cli/releases/latest/download/gh_2.95.0_linux_amd64.tar.gz
          tar -xzf gh.tar.gz
          sudo mv gh_*_linux_amd64/bin/gh /usr/local/bin/
          sudo chmod +x /usr/local/bin/gh
          gh --version

      - name: Copy missing releases
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_REPO: "eternumplay/pkstg"
          DEST_REPO: "ps5xploit/ps5shopappkg"
        run: |
          export GH_TOKEN="$GH_TOKEN"
          gh auth status
          
          echo "📦 Obteniendo releases de $SOURCE_REPO usando API..."
          
          # Obtener la lista de releases del origen
          RELEASES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$SOURCE_REPO/releases?per_page=100")
          
          echo "📋 Total releases en origen: $(echo "$RELEASES" | jq '. | length')"
          
          # Obtener la lista de releases ya existentes en destino
          echo "📦 Obteniendo releases ya existentes en $DEST_REPO..."
          DEST_RELEASES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$DEST_REPO/releases?per_page=100")
          
          DEST_TAGS=$(echo "$DEST_RELEASES" | jq -r '.[].tag_name')
          echo "📋 Releases ya existentes en destino: $(echo "$DEST_TAGS" | wc -l)"
          
          echo "$RELEASES" | jq -c '.[]' | while read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tag_name')
            RELEASE_NAME=$(echo "$release" | jq -r '.name')
            IS_PRERELEASE=$(echo "$release" | jq -r '.prerelease')
            
            # Verificar si el release ya existe en destino
            if echo "$DEST_TAGS" | grep -q "$TAG_NAME"; then
              echo "  ⏭️  Saltando: $TAG_NAME (ya existe en destino)"
              continue
            fi
            
            echo "📦 Procesando: $RELEASE_NAME ($TAG_NAME)"
            
            echo "  📝 Creando release $TAG_NAME..."
            if [ "$IS_PRERELEASE" = "true" ]; then
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" --prerelease --repo "$DEST_REPO" --notes "Copiado desde ps5shopappkg"
            else
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" --repo "$DEST_REPO" --notes "Copiado desde ps5shopappkg"
            fi
            
            # Obtener las URLs de los assets del release
            ASSETS=$(echo "$release" | jq -r '.assets[].browser_download_url')
            
            for ASSET_URL in $ASSETS; do
              FILENAME=$(basename "$ASSET_URL")
              echo "    📥 Descargando: $FILENAME"
              curl -L -o "$FILENAME" "$ASSET_URL"
              echo "    📤 Subiendo: $FILENAME"
              gh release upload "$TAG_NAME" "$FILENAME" --repo "$DEST_REPO" --clobber
              rm "$FILENAME"
              echo "    ✅ $FILENAME copiado."
            done
            echo "  ✅ $TAG_NAME copiado correctamente."
          done
          
          echo "🎉 ¡Proceso completado!"
