name: Copy Releases from Source Repo

on:
  workflow_dispatch:

jobs:
  copy-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          echo "📦 PASO 1: Instalando GitHub CLI..."
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y gh -qq
          echo "✅ PASO 1: Completado"

      - name: PASO 2 - Verificar secret
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🔐 PASO 2: Verificando secret..."
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ ERROR: El secret PAT_TOKEN está vacío o no existe!"
            exit 1
          else
            echo "✅ Secret PAT_TOKEN existe (longitud: ${#GH_TOKEN})"
          fi

      - name: PASO 3 - Probar autenticación
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🔐 PASO 3: Probando autenticación con GitHub CLI..."
          echo "$GH_TOKEN" | gh auth login --with-token
          echo "✅ PASO 3: Autenticación exitosa"

      - name: PASO 4 - Probar API
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "📡 PASO 4: Probando API de GitHub..."
          gh api user
          echo "✅ PASO 4: API funciona correctamente"

      - name: PASO 5 - Listar releases origen
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_REPO: "eternumplay/pkstg"
        run: |
          echo "📦 PASO 5: Listando releases de $SOURCE_REPO..."
          gh release list --repo "$SOURCE_REPO" --limit 5
          echo "✅ PASO 5: Listado completado"

      - name: PASO 6 - Obtener JSON de releases
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_REPO: "eternumplay/pkstg"
        run: |
          echo "📦 PASO 6: Obteniendo JSON de releases..."
          RELEASES=$(gh release list --repo "$SOURCE_REPO" --limit 100 --json tagName)
          echo "$RELEASES" | jq '.'
          echo "✅ PASO 6: JSON obtenido correctamente"
          
          echo "🎉 TODOS LOS PASOS COMPLETADOS CON ÉXITO"
