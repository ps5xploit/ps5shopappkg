name: Copy Releases from Source Repo

on:
  workflow_dispatch:

jobs:
  copy-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Copy releases using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_REPO: "eternumplay/pkstg"
          DEST_REPO: "ps5xploit/ps5shopappkg"
        run: |
          echo "🔐 Autenticando..."
          echo "$GH_TOKEN" | gh auth login --with-token
          
          echo "📦 Obteniendo releases de $SOURCE_REPO..."
          RELEASES=$(gh release list --repo "$SOURCE_REPO" --limit 100 --json tagName,name,isPrerelease,assets)
          
          echo "📋 Total releases: $(echo "$RELEASES" | jq '. | length')"
          
          echo "$RELEASES" | jq -c '.[]' | while read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tagName')
            RELEASE_NAME=$(echo "$release" | jq -r '.name')
            IS_PRERELEASE=$(echo "$release" | jq -r '.isPrerelease')
            
            echo "📦 Procesando: $RELEASE_NAME ($TAG_NAME)"
            
            if gh release view "$TAG_NAME" --repo "$DEST_REPO" &>/dev/null; then
              echo "  ⏭️  Release $TAG_NAME ya existe. Saltando."
              continue
            fi
            
            echo "  📝 Creando release $TAG_NAME..."
            if [ "$IS_PRERELEASE" = "true" ]; then
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" --prerelease --repo "$DEST_REPO" --notes "Copiado desde $SOURCE_REPO"
            else
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" --repo "$DEST_REPO" --notes "Copiado desde $SOURCE_REPO"
            fi
            
            ASSETS=$(echo "$release" | jq -r '.assets[].browser_download_url')
            for ASSET_URL in $ASSETS; do
              FILENAME=$(basename "$ASSET_URL")
              echo "    📥 Descargando: $FILENAME"
              curl -L -o "$FILENAME" "$ASSET_URL"
              echo "    📤 Subiendo: $FILENAME"
              gh release upload "$TAG_NAME" "$FILENAME" --repo "$DEST_REPO" --clobber
              rm "$FILENAME"
              echo "    ✅ $FILENAME copiado."
            done
            echo "  ✅ $TAG_NAME copiado correctamente."
          done
          
          echo "🎉 ¡Proceso completado!"
