name: Copy Releases from Source Repo

on:
  workflow_dispatch:

jobs:
  copy-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Copy releases from source repo
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_REPO: "eternumplay/pkstg"
        run: |
          echo "🔐 Autenticando con GitHub CLI..."
          echo "$GH_TOKEN" | gh auth login --with-token
          
          echo "📦 Obteniendo releases de $SOURCE_REPO..."
          RELEASES=$(gh release list --repo "$SOURCE_REPO" --limit 100 --json name,id,tagName,isPrerelease,assets)
          
          echo "📋 Releases encontrados: $(echo "$RELEASES" | jq '.[]' | grep -c '.')"
          
          echo "$RELEASES" | jq -c '.[]' | while read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tagName')
            RELEASE_NAME=$(echo "$release" | jq -r '.name')
            IS_PRERELEASE=$(echo "$release" | jq -r '.isPrerelease')
            
            echo "📦 Procesando: $RELEASE_NAME ($TAG_NAME)"
            
            if gh release view "$TAG_NAME" --repo "${{ github.repository }}" &>/dev/null; then
              echo "  ⏭️  Ya existe. Saltando."
              continue
            fi
            
            echo "  📝 Creando release $TAG_NAME..."
            if [ "$IS_PRERELEASE" = "true" ]; then
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" --prerelease --repo "${{ github.repository }}" --notes "Copiado desde $SOURCE_REPO"
            else
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" --repo "${{ github.repository }}" --notes "Copiado desde $SOURCE_REPO"
            fi
            
            echo "$release" | jq -r '.assets[].browser_download_url' | while read -r asset_url; do
              if [ -n "$asset_url" ]; then
                FILENAME=$(basename "$asset_url")
                echo "    📥 Descargando: $FILENAME"
                curl -L -o "$FILENAME" "$asset_url"
                echo "    📤 Subiendo: $FILENAME"
                gh release upload "$TAG_NAME" "$FILENAME" --repo "${{ github.repository }}" --clobber
                rm "$FILENAME"
              fi
            done
            echo "  ✅ $TAG_NAME copiado."
          done
          echo "🎉 ¡Proceso completado!"
